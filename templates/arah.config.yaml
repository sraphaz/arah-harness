# ARAH project config — customize per repository
# Generated by `arah init`. Safe to edit; preserved on `arah update`.

version: 1
harness:
  source: sraphaz/arah-harness
  version: "0.2.0"
  repository: https://github.com/sraphaz/arah-harness
  release: v0.2.0

project:
  name: "{{PROJECT_NAME}}"
  stack: fullstack  # backend | frontend | fullstack | docs

tests:
  backend: "echo 'Configure backend tests in arah.config.yaml'"
  frontend: "echo 'Configure frontend tests in arah.config.yaml'"
  all: "powershell -File ./scripts/agents/invoke-skill.ps1 -Skill run-tests -Area backend; powershell -File ./scripts/agents/invoke-skill.ps1 -Skill run-tests -Area frontend"

# Domain agents (consultivos) — edit then run: arah domain sync
domains:
  - id: example-domain
    name: Example Domain
    description: Substitua por um domínio real do seu negócio
    paths:
      - src/**/example/**
    enrich: |
      Regras de negócio e contexto que agentes devem respeitar neste domínio.
    validate: |
      Verificar invariantes de negócio antes do merge.
    references:
      - docs/README.md

# Stack specialists — optional; domain sync gera rules em choreography.domains.yaml
specialists: []
# Example:
#   - id: dotnet
#     name: .NET Specialist
#     stack: dotnet
#     paths:
#       - backend/**

# Agentes runtime da solução (execução por caso/advogado) — validate-runtime
# runtime:
#   path: packages/ai-orchestrator/agents
#   choreography: choreography.yaml
#   autonomy: autonomy.yaml

# Execution Control Protocol — terminalidade (intenção → um executor → done|blocked)
execution_control:
  enabled: true
  terminal_states:
    - done
    - blocked
  limits:
    max_handoffs: 2
    max_consultations: 2
    max_analysis_cycles: 1
  behavior:
    require_primary_executor: true
    forbid_consultant_to_consultant_handoff: true
    require_completion_evidence: true
    require_blocking_reason: true
    prevent_reroute_after_execution_started: true
