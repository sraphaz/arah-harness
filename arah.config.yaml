# ARAH Harness — self-hosted (o próprio repo usa o método)
version: 1
harness:
  source: sraphaz/arah-harness
  version: "0.4.0"
  repository: https://github.com/sraphaz/arah-harness
  release: v0.4.0

project:
  name: arah-harness
  stack: docs

tests:
  all: "powershell -File ./scripts/self-test.ps1"

domains:
  - id: kernel
    name: Kernel ARAH
    description: Agentes, skills, scripts e hooks distribuídos via init/update
    paths:
      - kernel/**
      - .agents/**
      - .skills/**
      - scripts/**
    enrich: |
      Kernel versionado — impacta todos os projetos derivados.
      Bump VERSION + CHANGELOG em releases.
    validate: |
      self-test.ps1 verde; diff em kernel/ revisado.
    references:
      - AGENTS.md
      - CHANGELOG.md

  - id: extension-live
    name: Extensão ARAH Live
    description: Painel Cursor/VS Code — telemetria ao vivo
    paths:
      - extension/**
    enrich: |
      Webview + hooks session-telemetry. Empacotar com vsce.
    validate: |
      npm run compile; painel reflete .cursor/arah-live/state.json.
    references:
      - extension/arah-live/README.md
      - docs/LIVE_SESSION.md

  - id: cli
    name: CLI ARAH
    description: init, update, doctor, domain sync, discover, organism, evolve, regenerate, export-graph
    paths:
      - cli/**
    enrich: |
      Entry point arah.ps1 — não quebrar compat PS 5.1.
    validate: |
      self-test.ps1 cobre init + domain sync + export-graph.
    references:
      - README.md

specialists: []

# Execution Control Protocol — terminalidade (intenção → um executor → done|blocked)
execution_control:
  enabled: true
  terminal_states:
    - done
    - blocked
  limits:
    max_handoffs: 2
    max_consultations: 2
    max_analysis_cycles: 1
  behavior:
    require_primary_executor: true
    forbid_consultant_to_consultant_handoff: true
    require_completion_evidence: true
    require_blocking_reason: true
    prevent_reroute_after_execution_started: true
