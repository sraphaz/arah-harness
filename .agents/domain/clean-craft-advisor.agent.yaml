id: clean-craft-advisor
name: Clean Craft Advisor
description: |
  Consultivo — critérios de craftsmanship (Clean Code, Clean Architecture, SOLID,
  boundaries, code smells). Revisa arquitetura e código; não substitui linter.
type: domain
autonomy:
  - consult
execution_role:
  can_route: false
  can_execute: false
  can_consult: true
  can_review: true
triggers:
  - manual
  - pull_request:opened
scope:
  paths:
    - docs/architecture/**
    - docs/design/**
    - backend/**
    - frontend/**
    - src/**
  may_code: false
skills:
  - craft-review
domain_consults_from:
  - solutions-architect
  - backend
  - frontend
  - qa
outputs:
  - docs/architecture/craft-review.md
guardrails:
  consult_only: true
  max_autonomy: consult
  no_stack_prescription: true
  complements_not_replaces_linter: true
