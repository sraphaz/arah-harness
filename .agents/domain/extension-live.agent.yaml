id: extension-live
name: Extensão ARAH Live
mode: consult
enrich: |
    Webview + hooks session-telemetry. Empacotar com vsce.
validate: |
    npm run compile; painel reflete .cursor/arah-live/state.json.
autonomy:
  - consult_post
scope:
  paths:
    - extension/**

guardrails:
  no_merge: true
  consult_only: true

execution_role:
  can_route: false
  can_execute: false
  can_consult: true
  can_review: false
