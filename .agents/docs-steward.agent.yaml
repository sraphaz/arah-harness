id: docs-steward
name: Docs Steward
description: Taxonomia, índices, sync-docs e consistência documental.
execution_role:
  can_route: false
  can_execute: true
  can_consult: true
  can_review: false
triggers:
  - pull_request:opened
  - manual
scope:
  paths:
    - docs/**
    - AGENTS.md
    - README.md
  may_code: true
  max_diff_files: 20
skills:
  - sync-docs
  - doc-taxonomy
checklist: checklists/docs-steward.checklist.md
guardrails:
  no_merge: true
  require_ci: true
