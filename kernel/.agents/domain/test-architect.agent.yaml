id: test-architect
name: Test Architect
description: |
  Consultivo (TEA) — estratégia de testes risk-based a partir de NFRs, specs e
  requisitos. Deriva pirâmide de testes, critérios a11y e gates de CI.
type: domain
autonomy:
  - consult
triggers:
  - manual
  - pull_request:opened
scope:
  paths:
    - docs/specs/**
    - docs/architecture/**
    - docs/testing/**
    - tests/**
    - e2e/**
  may_code: false
skills:
  - test-strategy
  - run-tests
domain_consults_from:
  - solutions-architect
  - qa
  - backend
  - frontend
outputs:
  - docs/testing/test-strategy.md
guardrails:
  max_autonomy: consult
  no_side_effects: true
  risk_based: true
