# Coreografia de agentes — kernel ARAH (genérico)
# Regras de domínio são mescladas no init a partir de arah.config.yaml
# Execution Control: cada regra executável resolve exatamente um primary_executor.
version: 2
updated: 2026-07-19
policy: |
  Regras aplicadas após roteamento do orquestrador.
  Uma tarefa pode ter vários participantes, mas exatamente um executor primário.
  Consultores retornam parecer estruturado ao executor; não conversam entre si.
  Domínios (type: domain) usam role: consultant.

rules:
  - id: specs-sdd
    paths:
      - docs/specs/**
      - scripts/harness/**
    execution:
      primary_executor: spec-steward
    agents:
      - id: spec-steward
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
        skills: [spec-validate, harness-run]

  - id: architecture-docs
    paths:
      - docs/architecture/**
      - docs/design/**
      - docs/adr/**
    execution:
      primary_executor: solutions-architect
    agents:
      - id: solutions-architect
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
        skills: [architecture-review, register-adr, craft-review]
      - id: architecture-documenter
        type: domain
        role: consultant
        autonomy: [consult]
        skills: [architecture-review, register-adr, doc-taxonomy]
      - id: clean-craft-advisor
        type: domain
        role: consultant
        autonomy: [consult]
        skills: [craft-review]

  - id: testing-strategy
    paths:
      - docs/testing/**
      - tests/**
      - e2e/**
    execution:
      primary_executor: qa
    agents:
      - id: qa
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
        skills: [run-tests, craft-review]
      - id: test-architect
        type: domain
        role: consultant
        autonomy: [consult]
        skills: [test-strategy, run-tests]

  - id: craft-backend
    paths:
      - backend/**
      - src/**/api/**
      - services/**
    execution:
      primary_executor: backend
    agents:
      - id: backend
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
        skills: [craft-review]
      - id: solutions-architect
        type: operational
        role: consultant
        autonomy: [consult_post, invoke_skill]
        skills: [craft-review]

  - id: craft-frontend
    paths:
      - frontend/**
      - apps/web/**
      - apps/mobile/**
    execution:
      primary_executor: frontend
    agents:
      - id: frontend
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
        skills: [craft-review]

  - id: infra-deploy
    paths:
      - .github/workflows/**
      - infrastructure/**
      - docker-compose*.yml
      - Dockerfile
    execution:
      primary_executor: release
    agents:
      - id: release
        type: operational
        role: executor
        autonomy: [activate, execute_change]

  - id: biocomponent-meta
    paths:
      - docs/_meta/discovery.proposed.yaml
      - docs/_meta/organism.manifest.yaml
      - docs/_meta/evolution.proposed.yaml
      - docs/_meta/metrics.digest.md
      - docs/TECHORGANISM.md
      - docs/BIOCOMPONENT.md
      - docs/ECONOMY.md
      - schemas/arah-harness/discovery.schema.yaml
      - schemas/arah-harness/organism.schema.yaml
      - schemas/arah-harness/signal.schema.yaml
      - schemas/arah-harness/evolution.schema.yaml
      - schemas/arah-harness/metrics-summary.schema.yaml
      - scripts/agents/discover-repo.ps1
      - scripts/agents/organism-bootstrap.ps1
      - scripts/agents/signal-bus.ps1
      - scripts/agents/evolve-harness.ps1
      - scripts/agents/metrics-rollup.ps1
      - scripts/agents/regenerate-harness.ps1
    execution:
      primary_executor: docs-steward
    agents:
      - id: docs-steward
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
      - id: orchestrator
        type: operational
        role: router
        autonomy: [route, activate, invoke_skill]
        skills: [discover-repo, evolve-harness, regenerate-harness, metrics-rollup]
      - id: spec-steward
        type: operational
        role: consultant
        autonomy: [activate, invoke_skill]
        skills: [spec-validate]
      - id: solutions-architect
        type: operational
        role: consultant
        autonomy: [consult, invoke_skill]
        skills: [architecture-review]

  - id: economy-intelligence
    paths:
      - schemas/arah-harness/metrics-summary.schema.yaml
      - schemas/arah-harness/audit-event.schema.yaml
      - scripts/agents/metrics-rollup.ps1
      - scripts/agents/record-agent-event.ps1
      - .skills/metrics-rollup.skill.yaml
      - docs/ECONOMY.md
      - docs/OBSERVABILITY.md
      - docs/AUDIT.md
      - docs/specs/arah-economy-metrics.spec.yaml
      - cli/arah.ps1
    execution:
      primary_executor: docs-steward
    agents:
      - id: docs-steward
        type: operational
        role: executor
        autonomy: [activate, execute_change, invoke_skill]
      - id: orchestrator
        type: operational
        role: router
        autonomy: [route, activate, invoke_skill]
        skills: [metrics-rollup, evolve-harness]
      - id: spec-steward
        type: operational
        role: consultant
        autonomy: [activate, invoke_skill]
        skills: [spec-validate]

  - id: pr-always
    paths:
      - "**"
    when: pull_request
    execution:
      primary_executor: pr-steward
    agents:
      - id: pr-steward
        type: operational
        role: executor
        autonomy: [activate, execute_change]
      - id: qa
        type: operational
        role: reviewer
        autonomy: [activate, invoke_skill]
        skills: [craft-review, run-tests]
      - id: clean-craft-advisor
        type: domain
        role: consultant
        autonomy: [consult]
        skills: [craft-review]
      - id: test-architect
        type: domain
        role: consultant
        autonomy: [consult]
        skills: [test-strategy]
      - id: security
        type: operational
        role: reviewer
        autonomy: [consult, invoke_skill]
        skills: [dep-audit, code-review]
