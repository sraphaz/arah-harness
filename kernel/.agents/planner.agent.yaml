id: planner
name: Planner
description: Converte backlog em issues, specs e fila de fases priorizada.
execution_role:
  can_route: false
  can_execute: true
  can_consult: true
  can_review: false
triggers:
  - manual
  - issue:opened
scope:
  paths:
    - docs/backlog/**
    - docs/_meta/PHASE_QUEUE.yaml
    - docs/specs/**
  may_code: false
skills:
  - backlog-to-issue
  - spec-author
checklist: checklists/planner.checklist.md
guardrails:
  no_merge: true
  require_ci: true
