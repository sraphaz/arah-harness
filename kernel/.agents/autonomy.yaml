# Autonomy levels — ARAH Harness
# Source of truth for choreography, audit trails, and human gates.
version: "1.0"
updated: 2026-07-19

levels:
  observe:
    rank: 0
    description: Read session, specs, choreography — no writes
  consult:
    rank: 1
    description: Domain advisory — no artifact changes
  route:
    rank: 2
    description: Suggest handoff and options — orchestrator
  activate:
    rank: 3
    description: >
      Produce or update preparatory artifacts in scope
      (manifests, specs, planning docs) — not product delivery itself
  execute_change:
    rank: 4
    description: >
      Edit product or repository files within the declared scope,
      execute the requested change and produce completion evidence
  invoke_skill:
    rank: 5
    description: Run deterministic skills/scripts (run-tests, spec-validate, etc.)
  side_effect:
    rank: 6
    description: Release, deploy hooks, external registry
  public:
    rank: 7
    description: Public release — always requires explicit human gate

agent_defaults:
  orchestrator: route
  planner: activate
  spec-steward: invoke_skill
  solutions-architect: execute_change
  architecture-documenter: consult
  clean-craft-advisor: consult
  test-architect: consult
  backend: execute_change
  frontend: execute_change
  docs-steward: execute_change
  qa: invoke_skill
  pr-steward: activate
  release: side_effect
  security: consult

human_gates:
  spec_before_work:
    required_before: [execute_change, invoke_skill, side_effect]
    skip_for_work_class: [trivial]
    approval_stage: spec_before_work
  release_approval:
    required_before: [side_effect]
    approval_stage: release_approval
  destructive:
    required_before: [side_effect]
    approval_stage: destructive
    always_explicit_user: true

actions:
  - session.read
  - session.write
  - domain.consult
  - route.handoff
  - skill.invoke
  - execute.change
  - pr.comment
  - release.cut
  - deploy.trigger
  - human.gate.requested
  - human.gate.approved
  - human.gate.denied
  - choreography.resolve
  - autonomy.blocked
  - execution.complete
  - execution.block
