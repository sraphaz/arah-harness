# destino: arah-harness/profiles/consulting.yaml
# Profile padrão dos repos de demanda de consultoria (genérico — sem marca).

id: consulting
name: "Consulting"
extends: minimal
description: "Spec-before-work, escopo aprovado, aceite de handoff, domain agents consultivos."

model:
  domain_agents:
    - id: clean-craft-advisor
      required: true
      max_autonomy: consult
      skills: [craft-review]
    - id: test-architect
      required: true
      max_autonomy: consult
      skills: [test-strategy, run-tests]
    - id: architecture-documenter
      required: true
      max_autonomy: consult
      skills: [architecture-review, register-adr, doc-taxonomy]
  governance:
    autonomy_source: .agents/autonomy.yaml
    autonomy_levels: [observe, consult, route, activate, invoke_skill, side_effect, public]
    human_gates: [spec_before_work, proposal_before_implementation, contract_before_build, handoff_acceptance]
    blocked_actions: [merge, approve, force_push, release.cut, deploy.production]
  observability:
    diagnostics: .cursor/arah-live/diagnostics.jsonl
    session_traces: .cursor/arah-live/sessions/
    metrics_summary: .arah/observability/summary.yaml
    metrics_digest: docs/_meta/metrics.digest.md
    agent_graph: docs/_meta/agent-graph.generated.json
  audit:
    event_schema: arah-harness/audit-event
    ledger_path: .arah/local/audit/
    retention_policy: project_default
    record_script: scripts/agents/record-agent-event.ps1

installs:
  templates:
    - docs/specs/README.md
    - docs/governance/DEFINITION_OF_DONE.md
    - docs/ops/AGENT_OPERATION.md
    - .agents/autonomy.yaml
    - .agents/pr-steward.yaml
    - scripts/agents/record-agent-event.ps1
    - .github/workflows/validate-specs.yml
    - .github/workflows/harness-checks.yml
  agents:
    - pr-steward
    - clean-craft-advisor
    - test-architect
    - architecture-documenter

pr_checks:
  - no-direct-main
  - no-secrets
  - agent-scope
  - spec-before-work
  - docs-synced

approval_gates:
  - proposal_before_implementation
  - contract_before_build
  - handoff_acceptance

options:
  spec_before_work: true
  block_direct_main: true
  secrets_scan: true
  require_adr: true
  spec_source_link: true
  artifact_registry: docs/specs/REGISTRY.md

definition_of_done:
  - "tudo do minimal"
  - "spec correspondente atualizada e válida"
  - "escopo rastreável ao proposal-scope aprovado"
  - "ADR para decisão estrutural"
  - "domain agents consultivos acionados em PRs de arquitetura/testes"
