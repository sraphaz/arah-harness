# destino: arah-harness/profiles/product.yaml
# Produto com vida longa: roadmap, releases, ADRs, qualidade, domain agents.

id: product
name: "Product"
extends: minimal
description: "Roadmap, releases com changelog, ADRs, testes e qualidade contínua."

model:
  domain_agents:
    - id: clean-craft-advisor
      required: true
      max_autonomy: consult
      skills: [craft-review]
    - id: test-architect
      required: true
      max_autonomy: consult
      skills: [test-strategy, run-tests]
    - id: architecture-documenter
      required: true
      max_autonomy: consult
      skills: [architecture-review, register-adr, doc-taxonomy]
  governance:
    autonomy_source: .agents/autonomy.yaml
    autonomy_levels: [observe, consult, route, activate, invoke_skill, side_effect, public]
    human_gates: [spec_before_work, release_approval]
    blocked_actions: [merge, approve, force_push, release.cut, deploy.production]
  observability:
    diagnostics: .cursor/arah-live/diagnostics.jsonl
    session_traces: .cursor/arah-live/sessions/
    metrics_summary: .arah/observability/summary.yaml
    agent_graph: docs/_meta/agent-graph.generated.json
  audit:
    event_schema: arah-harness/audit-event
    ledger_path: .arah/local/audit/
    retention_policy: project_default
    record_script: scripts/agents/record-agent-event.ps1

installs:
  templates:
    - docs/ROADMAP.md
    - docs/adr/README.md
    - CHANGELOG.md
    - .agents/pr-steward.yaml
    - .github/workflows/validate-specs.yml
    - .github/workflows/quality.yml
    - .github/workflows/harness-checks.yml
  agents:
    - pr-steward
    - clean-craft-advisor
    - test-architect
    - architecture-documenter

pr_checks:
  - no-direct-main
  - no-secrets
  - agent-scope
  - spec-before-work
  - adr-for-structure
  - changelog-on-release

approval_gates:
  - release_approval

options:
  spec_before_work: true
  block_direct_main: true
  secrets_scan: true
  require_adr: true
  versioning: semver
  test_coverage_min: null

definition_of_done:
  - "tudo do minimal"
  - "testes cobrindo a mudança; qualidade verde"
  - "ADR para decisão estrutural"
  - "CHANGELOG atualizado quando release"
  - "craft-review e test-strategy consultivos em mudanças estruturais"
