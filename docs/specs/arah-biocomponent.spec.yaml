id: arah-biocomponent
title: Dimensão biocomponente — discovery, organismo, sinais e evolução
status: active
owner: spec-steward
version: 1
updated_at: 2026-07-17
covers:
  - cli/arah.ps1
  - cli/regenerate.ps1
  - scripts/agents/discover-repo.ps1
  - scripts/agents/organism-bootstrap.ps1
  - scripts/agents/signal-bus.ps1
  - scripts/agents/evolve-harness.ps1
  - scripts/agents/regenerate-harness.ps1
  - kernel/scripts/agents/discover-repo.ps1
  - kernel/scripts/agents/organism-bootstrap.ps1
  - kernel/scripts/agents/signal-bus.ps1
  - kernel/scripts/agents/evolve-harness.ps1
  - kernel/scripts/agents/regenerate-harness.ps1
  - schemas/arah-harness/organism.schema.yaml
  - schemas/arah-harness/discovery.schema.yaml
  - schemas/arah-harness/evolution.schema.yaml
  - schemas/arah-harness/signal.schema.yaml
  - docs/BIOCOMPONENT.md
  - docs/METHOD.md
  - docs/MARKET_REFERENCE.md
  - docs/ROADMAP.md
  - .skills/discover-repo.skill.yaml
  - .skills/evolve-harness.skill.yaml
  - .skills/regenerate-harness.skill.yaml
  - kernel/.skills/discover-repo.skill.yaml
  - kernel/.skills/evolve-harness.skill.yaml
  - kernel/.skills/regenerate-harness.skill.yaml

description: |
  Evolui o ARAH Harness de kernel determinístico para biocomponente tecnológico:
  observa o repositório (domínio + stack), propõe células (agentes), define
  comunicação tipada entre elas, e evolui definições/skills/coreografia a cada
  ciclo — sempre via artefatos auditáveis e merge humano.

  Princípio de governança: agentes PROPOEM; humanos APLICAM.
  Não há criação silenciosa de agentes (anti-padrão de mercado mantido,
  reinterpretado como loop de proposta + gate).

acceptance:
  - id: AC-01
    when: operador executa arah discover em um repositório com código
    then: gera docs/_meta/discovery.proposed.yaml com stack, domínios e especialistas candidatos
    status: pending
    covered_by: scripts/agents/discover-repo.ps1

  - id: AC-02
    when: operador executa arah organism bootstrap após discovery
    then: gera docs/_meta/organism.manifest.yaml com células, grupos e topologia de sinais
    status: pending
    covered_by: scripts/agents/organism-bootstrap.ps1

  - id: AC-03
    when: um agente emite um sinal tipado via signal-bus
    then: o sinal é append-only em .arah/bus/signals.jsonl com schema válido
    status: pending
    covered_by: scripts/agents/signal-bus.ps1

  - id: AC-04
    when: operador executa arah evolve após eventos de auditoria/telemetria
    then: gera docs/_meta/evolution.proposed.yaml com propostas de melhoria (skills, coreografia, células)
    status: pending
    covered_by: scripts/agents/evolve-harness.ps1

  - id: AC-05
    when: operador executa arah regenerate em um consumidor
    then: reaplica kernel, sincroniza domínios, discovery, organismo, evolve, grafo e doctor
    status: pending
    covered_by: scripts/agents/regenerate-harness.ps1

  - id: AC-06
    when: propostas de discovery/evolution existem e Apply é solicitado
    then: apenas patches em arah.config.yaml / overlays são escritos; merge continua humano
    status: pending
    covered_by: scripts/agents/discover-repo.ps1

harness:
  commands:
    - powershell -File ./scripts/self-test.ps1
    - powershell -File ./cli/arah.ps1 discover -Target .
    - powershell -File ./cli/arah.ps1 organism bootstrap -Target .
    - powershell -File ./cli/arah.ps1 evolve -Target .
